services:
  grafana:
    image: grafana/grafana:10.4.0
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    env_file: .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?GF_ADMIN_PASSWORD obrigatório no .env}
      - GF_SERVER_ROOT_URL=https://monitoramento.firmasolar.com.br
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
      # Abre direto no dashboard de monitoramento ao logar (evita tela de boas-vindas)
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/principal/monitoramento_alertas.json
      # Viewer não pode editar nem criar dashboards
      - GF_USERS_DEFAULT_THEME=dark
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # Formato de datas em DD/MM/YYYY (padrão brasileiro)
      - GF_DATE_FORMATS_FULL_DATE=DD/MM/YYYY HH:mm:ss
      - GF_DATE_FORMATS_INTERVAL_SECOND=HH:mm:ss
      - GF_DATE_FORMATS_INTERVAL_MINUTE=DD/MM HH:mm
      - GF_DATE_FORMATS_INTERVAL_HOUR=DD/MM HH:mm
      - GF_DATE_FORMATS_INTERVAL_DAY=DD/MM/YYYY
      - GF_DATE_FORMATS_INTERVAL_MONTH=MM/YYYY
      - GF_DATE_FORMATS_INTERVAL_YEAR=YYYY
      # Credenciais do PostgreSQL — repassadas para o datasource via provisioning
      # DB_HOST aponta para o serviço db do backend via rede compartilhada firmasolar_obs
      - DB_HOST=backend_monitoramento-db-1
      - DB_PORT=5432
      - DB_NOME=${DB_NOME:?DB_NOME obrigatório no .env}
      - DB_USUARIO=${DB_USUARIO:?DB_USUARIO obrigatório no .env}
      - DB_SENHA=${DB_SENHA:?DB_SENHA obrigatório no .env}
    ports:
      # Exposto apenas para localhost — use um reverse proxy (nginx/caddy) para acesso externo
      - "127.0.0.1:3000:3000"
    networks:
      - firmasolar_obs
    restart: unless-stopped

volumes:
  grafana_data:
    # Named volume: Docker gerencia ownership (UID 472) automaticamente

networks:
  firmasolar_obs:
    external: true
