global:
  scrape_interval: 60s       # coleta métricas a cada 60s
  evaluation_interval: 60s

scrape_configs:
  - job_name: 'firma_solar_backend'
    # O backend Django expõe /metricas/ com autenticação via Bearer token
    # Crie o arquivo prometheus/metrics_token.txt com o mesmo valor de METRICAS_TOKEN do backend .env
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/metrics_token.txt
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics/
