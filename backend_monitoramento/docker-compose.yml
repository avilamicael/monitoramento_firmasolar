services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NOME}
      POSTGRES_USER: ${DB_USUARIO}
      POSTGRES_PASSWORD: ${DB_SENHA}
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    # Porta não exposta ao host — Grafana acessa via rede compartilhada firmasolar_obs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USUARIO} -d ${DB_NOME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default
      - firmasolar_obs
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - ../data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build: .
    command: celery -A config worker -l info --concurrency 2
    env_file: .env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: .
    command: celery -A config beat -l info
    env_file: .env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  evolution-api:
    image: atendai/evolution-api:latest
    volumes:
      - ../data/evolution:/evolution/instances
    ports:
      # Exposto apenas no loopback — acessar via SSH tunnel para conectar o celular:
      # ssh -L 8080:localhost:8080 ubuntu@monitoramento.firmasolar.com.br
      # Depois: http://localhost:8080/manager
      - "127.0.0.1:8080:8080"
    environment:
      - SERVER_PORT=8080
      - AUTHENTICATION_API_KEY=${WHATSAPP_EVOLUTION_TOKEN}
      - DATABASE_ENABLED=false
      - LOG_LEVEL=ERROR
      - LOG_COLOR=false
      - DEL_INSTANCE=false
    restart: unless-stopped

networks:
  firmasolar_obs:
    external: true
